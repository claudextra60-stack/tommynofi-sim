<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: monospace; background: #e0e0e0; }
        #map { width: 500px; height: 400px; border: 3px solid black; position: relative; background: white; }
        .store { position: absolute; border: 2px solid blue; padding: 5px; background: white; font-size: 12px; }
    </style>
</head>
<body>
    <h1>JioMart Simulator</h1>
    <div class="controls">
        Weather: <select id="w" onchange="refresh()">
            <option value="clear">Clear</option>
            <option value="rain">Rain</option>
        </select>
        Payday: <input type="checkbox" id="p" onchange="refresh()">
    </div>
    <br>
    <div id="map"></div>

    <script>
        async function refresh() {
            const data = await fetch('data.json').then(r => r.json());
            const w = document.getElementById('w').value;
            const p = document.getElementById('p').checked;
            const mult = (w === 'rain' || p) ? 0.2 : 1;
            
            const map = document.getElementById('map');
            map.innerHTML = data.stores.map(s => `
                <div class="store" style="left:${s.x}%; top:${s.y}%">
                    ${s.name}<br>Stock: ${Math.floor(s.stock * mult)}
                </div>
            `).join('');
        }
        refresh();
    </script>
</body>
</html>
