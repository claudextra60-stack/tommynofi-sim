<!DOCTYPE html>
<html>
<head>
    <style>
        .store { border: 1px solid #ccc; padding: 10px; margin: 10px; display: inline-block; }
        .controls { background: #f4f4f4; padding: 15px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>JioMart Simulator</h1>
    
    <div class="controls">
        <h3>Simulation Knobs</h3>
        <label>Weather: 
            <select id="weatherKnob" onchange="updateKnobs()">
                <option value="clear">Clear</option>
                <option value="rain">Rain</option>
            </select>
        </label>
        <label>Payday: 
            <input type="checkbox" id="paydayKnob" onchange="updateKnobs()">
        </label>
    </div>

    <div id="app">Loading...</div>

    <script>
        // 1. Load base data and apply overrides
        async function loadSimulation() {
            const baseData = await fetch('data.json').then(r => r.json());
            const overrides = JSON.parse(localStorage.getItem('knobs')) || { weather: 'clear', isPayday: false };
            
            // Apply overrides to UI
            document.getElementById('weatherKnob').value = overrides.weather;
            document.getElementById('paydayKnob').checked = overrides.isPayday;

            render(baseData, overrides);
        }

        // 2. Save knobs to browser memory
        function updateKnobs() {
            const knobs = {
                weather: document.getElementById('weatherKnob').value,
                isPayday: document.getElementById('paydayKnob').checked
            };
            localStorage.setItem('knobs', JSON.stringify(knobs));
            location.reload(); // Refresh to show impact
        }

        function render(data, knobs) {
            const app = document.getElementById('app');
            // Logic: If raining or payday, drastically reduce stock
            const multiplier = (knobs.weather === 'rain' || knobs.isPayday) ? 0.2 : 1;
            
            app.innerHTML = data.stores.map(s => `
                <div class="store">
                    <h3>${s.name}</h3>
                    <p>Stock: ${Math.floor(s.stock * multiplier)}</p>
                    <p>Drivers: ${s.drivers}</p>
                </div>
            `).join('');
        }

        loadSimulation();
    </script>
</body>
</html>
