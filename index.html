<!DOCTYPE html>
<html>
<head>
    <title>JioMart Simulator</title>
    <style>
        #map { position: relative; width: 600px; height: 400px; border: 1px solid black; background: #eee; margin-top: 20px; }
        .store { position: absolute; width: 20px; height: 20px; background: blue; cursor: pointer; border-radius: 50%; }
        .store:hover { background: red; transform: scale(1.5); }
    </style>
</head>
<body>
    <h1>JioMart Simulator</h1>
    <div class="controls">
        Weather: 
        <select id="weatherKnob" onchange="updateKnobs()">
            <option value="clear">Clear</option>
            <option value="rain">Rain</option>
        </select>
        Payday: 
        <input type="checkbox" id="paydayKnob" onchange="updateKnobs()">
    </div>
    
    <div id="map"></div>

    <script>
        async function loadSimulation() {
            try {
                const response = await fetch('data.json');
                if (!response.ok) throw new Error('File not found');
                const baseData = await response.json();
                
                const storedKnobs = localStorage.getItem('knobs');
                const overrides = storedKnobs ? JSON.parse(storedKnobs) : { weather: 'clear', isPayday: false };
                
                document.getElementById('weatherKnob').value = overrides.weather;
                document.getElementById('paydayKnob').checked = overrides.isPayday;

                renderMap(baseData, overrides);
            } catch (e) {
                document.getElementById('map').innerHTML = "Error loading data.json: " + e.message;
            }
        }

        function updateKnobs() {
            localStorage.setItem('knobs', JSON.stringify({
                weather: document.getElementById('weatherKnob').value,
                isPayday: document.getElementById('paydayKnob').checked
            }));
            location.reload();
        }

        function renderMap(data, knobs) {
            const map = document.getElementById('map');
            const multiplier = (knobs.weather === 'rain' || knobs.isPayday) ? 0.2 : 1;
            
            map.innerHTML = data.stores.map(s => `
                <div class="store" style="left: ${s.x}%; top: ${s.y}%;" 
                     onclick="alert('${s.name} \\nStock: ${Math.floor(s.stock * multiplier)} \\nDrivers: ${s.drivers}')"></div>
            `).join('');
        }
        
        loadSimulation();
    </script>
</body>
</html>
